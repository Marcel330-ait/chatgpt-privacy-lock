<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChatGPT Privacy Lock</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="cpl-popup">
    <main>
      <header>
        <div class="cpl-popup-lock" aria-hidden="true">&#128274;</div>
        <div>
          <h1 data-i18n="popupTitle">Privacy Lock</h1>
          <p data-i18n="popupSubtitle">Protect ChatGPT sidebar history.</p>
        </div>
      </header>

      <form id="privacy-form">
        <label class="cpl-toggle-row" for="enabled">
          <span>
            <strong data-i18n="sidebarProtection">Sidebar protection</strong>
            <small id="status-text">Off</small>
          </span>
          <input id="enabled" type="checkbox" role="switch" />
          <span class="cpl-toggle" aria-hidden="true"></span>
        </label>

        <label class="cpl-field-label" for="language">
          <span data-i18n="languageLabel">Language</span>
          <select id="language">
            <option value="auto" data-i18n="languageAuto">Auto</option>
            <option value="zh_CN" data-i18n="languageChinese">中文</option>
            <option value="en" data-i18n="languageEnglish">English</option>
          </select>
          <small data-i18n="languageHelp">Auto follows Chrome's language.</small>
        </label>

        <fieldset class="cpl-area-fieldset">
          <legend data-i18n="protectWhat">Hide these sidebar areas</legend>
          <label><input type="checkbox" data-area="search" /> <span data-i18n="areaSearch">Search chats</span></label>
          <label><input type="checkbox" data-area="library" /> <span data-i18n="areaLibrary">Library</span></label>
          <label><input type="checkbox" data-area="pinned" /> <span data-i18n="areaPinned">Pinned chats</span></label>
          <label><input type="checkbox" data-area="projects" /> <span data-i18n="areaProjects">Projects</span></label>
          <label><input type="checkbox" data-area="chats" /> <span data-i18n="areaChats">Previous chats</span></label>
          <small data-i18n="protectWhatHelp">New chat and the current conversation stay usable.</small>
        </fieldset>

        <label class="cpl-field-label" for="pin">
          <span id="pin-label">Set a PIN</span>
          <input
            id="pin"
            type="password"
            inputmode="numeric"
            autocomplete="off"
            maxlength="32"
            placeholder="At least 4 characters"
            data-i18n-placeholder="pinPlaceholder"
          />
          <small id="pin-help">Required before you can enable protection.</small>
        </label>

        <p class="cpl-popup-error" id="popup-error" aria-live="polite"></p>
        <button class="cpl-save-button" type="submit" data-i18n="saveSettings">Save settings</button>
      </form>

      <button class="cpl-lock-now" id="lock-now" type="button" data-i18n="lockNow">Lock Now</button>
      <p class="cpl-note" data-i18n="securityNote">A privacy layer for shoulder-surfing and casual access—not account-level security.</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
