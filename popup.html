<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChatGPT Privacy Lock</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="cpl-popup">
    <main>
      <header>
        <div class="cpl-popup-lock">🔒</div>
        <div>
          <h1>Privacy Lock</h1>
          <p>Protect ChatGPT sidebar history.</p>
        </div>
      </header>

      <form id="privacy-form">
        <label class="cpl-toggle-row" for="enabled">
          <span>
            <strong>Sidebar protection</strong>
            <small id="status-text">Off</small>
          </span>
          <input id="enabled" type="checkbox" role="switch" />
          <span class="cpl-toggle" aria-hidden="true"></span>
        </label>

        <label class="cpl-field-label" for="pin">
          <span id="pin-label">Set a PIN</span>
          <input id="pin" type="password" inputmode="numeric" autocomplete="off" maxlength="32" placeholder="At least 4 characters" />
          <small id="pin-help">Required before you can enable protection.</small>
        </label>

        <p class="cpl-popup-error" id="popup-error" aria-live="polite"></p>
        <button class="cpl-save-button" type="submit">Save settings</button>
      </form>

      <button class="cpl-lock-now" id="lock-now" type="button">Lock Now</button>
      <p class="cpl-note">A privacy layer for shoulder-surfing and casual access—not account-level security.</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
